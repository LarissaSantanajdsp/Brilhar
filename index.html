<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vamos Brilhar</title>

<style>
:root {
  --white: #ffffff;
  --black: #020305;
  --blue: #07152f;
}

/* ---------- CONFIGURAÇÃO GERAL ---------- */

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--black);
  color: var(--white);
  font-family:
    Arial,
    Helvetica,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

button,
input {
  font: inherit;
}

.screen {
  width: 100%;
  height: 100%;
  min-height: 100dvh;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  text-align: center;
}

/* ---------- PRIMEIRA TELA ---------- */

#startScreen {
  position: relative;
  padding: 28px;

  background:
    radial-gradient(
      circle at 50% 58%,
      rgba(20, 55, 120, 0.36) 0%,
      rgba(5, 15, 40, 0.24) 32%,
      transparent 64%
    ),
    linear-gradient(145deg, #050608 0%, #010203 100%);
}

#startScreen::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;

  background:
    repeating-linear-gradient(
      115deg,
      rgba(255,255,255,0.015) 0,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 7px
    );
}

.start-content {
  position: relative;
  z-index: 2;
  width: min(90vw, 580px);
}

h1 {
  margin: 0 0 22px;

  font-size: clamp(42px, 11vw, 88px);
  font-weight: 950;
  line-height: 0.92;
  letter-spacing: -0.055em;

  text-transform: uppercase;
}

.instruction {
  margin: 0 0 30px;

  font-size: clamp(18px, 4.8vw, 28px);
  font-weight: 400;
  line-height: 1.3;

  opacity: 0.9;
}

#nameInput {
  width: min(84vw, 500px);
  padding: 18px 22px;

  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 12px;

  background: rgba(0,0,0,0.35);
  color: white;

  font-size: clamp(23px, 6vw, 36px);
  text-align: center;

  outline: none;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 0 35px rgba(80,120,255,0.12);
}

#nameInput:focus {
  border-color: white;

  box-shadow:
    0 0 0 3px rgba(255,255,255,0.12),
    0 0 45px rgba(80,130,255,0.26);
}

#nameInput::placeholder {
  color: rgba(255,255,255,0.4);
}

#shineButton {
  margin-top: 22px;
  padding: 16px 36px;

  border: 0;
  border-radius: 999px;

  background: white;
  color: black;

  font-size: clamp(19px, 4.8vw, 27px);
  font-weight: 850;

  cursor: pointer;

  box-shadow:
    0 0 24px rgba(255,255,255,0.22),
    0 0 60px rgba(80,120,255,0.12);
}

/* ---------- TELA DO NOME ---------- */

#shineScreen {
  display: none;
  position: relative;
  isolation: isolate;
  overflow: hidden;

  background:
    radial-gradient(
      ellipse at 50% 54%,
      rgba(8, 40, 105, 0.8) 0%,
      rgba(5, 20, 58, 0.55) 25%,
      rgba(2, 7, 18, 0.85) 55%,
      #010203 82%
    );
}

/* Textura discreta */

#shineScreen .texture {
  position: absolute;
  inset: 0;
  z-index: -5;
  pointer-events: none;

  opacity: 0.42;

  background:
    repeating-linear-gradient(
      115deg,
      rgba(255,255,255,0.018) 0,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 8px
    ),
    repeating-linear-gradient(
      25deg,
      rgba(50,100,255,0.015) 0,
      rgba(50,100,255,0.015) 2px,
      transparent 2px,
      transparent 13px
    );
}

/* Névoa azul atrás do nome */

.blue-cloud {
  position: absolute;
  left: 50%;
  top: 53%;
  z-index: -4;

  width: 125vw;
  height: 54vh;

  transform: translate(-50%, -50%);

  border-radius: 50%;

  background:
    radial-gradient(
      ellipse,
      rgba(10, 66, 172, 0.72) 0%,
      rgba(8, 39, 112, 0.42) 35%,
      rgba(4, 12, 35, 0.08) 68%,
      transparent 78%
    );

  filter: blur(18px);

  animation: cloudPulse 3.2s ease-in-out infinite;
}

/* ---------- PRISMA CENTRAL ---------- */

.prism {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: -1;

  width: min(76vw, 660px);
  aspect-ratio: 1.15 / 1;

  transform: translate(-50%, -53%);

  filter:
    drop-shadow(0 0 12px rgba(255,255,255,0.28))
    drop-shadow(0 0 34px rgba(85,125,255,0.18));

  animation: prismPulse 3.2s ease-in-out infinite;
}

/* Triângulo externo */

.prism::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      140deg,
      rgba(255,255,255,0.95),
      rgba(255,255,255,0.13) 19%,
      rgba(120,150,255,0.13) 48%,
      rgba(255,255,255,0.88)
    );

  clip-path: polygon(
    50% 2%,
    100% 94%,
    0% 94%
  );
}

/* Recorte interno para criar somente a borda */

.prism::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 53%;

  width: 87%;
  height: 84%;

  transform: translate(-50%, -50%);

  background:
    radial-gradient(
      ellipse at center,
      rgba(8,38,100,0.42),
      rgba(0,0,0,0.76) 72%
    );

  clip-path: polygon(
    50% 3%,
    98% 94%,
    2% 94%
  );
}

/* ---------- PEQUENOS PRISMAS ---------- */

.mini-prism {
  position: absolute;
  z-index: 1;

  width: clamp(58px, 17vw, 125px);
  aspect-ratio: 1;

  opacity: 0.88;

  background:
    conic-gradient(
      from 25deg,
      rgba(255,255,255,0.95),
      rgba(55,120,255,0.75),
      rgba(100,0,255,0.55),
      rgba(0,240,255,0.65),
      rgba(255,255,255,0.95)
    );

  clip-path: polygon(
    50% 3%,
    96% 78%,
    13% 96%
  );

  filter:
    saturate(1.5)
    drop-shadow(0 0 8px rgba(255,255,255,0.5))
    drop-shadow(0 0 17px rgba(35,95,255,0.45));

  animation: prismFloat 4.4s ease-in-out infinite;
}

.mini-prism::after {
  content: "";
  position: absolute;
  inset: 12%;

  background: rgba(3,8,20,0.88);

  clip-path: polygon(
    50% 3%,
    96% 78%,
    13% 96%
  );
}

.mini-left {
  left: 5vw;
  top: 43%;
  transform: rotate(-16deg);
}

.mini-right {
  right: 5vw;
  top: 19%;
  transform: rotate(18deg);
  animation-delay: -1.5s;
}

/* ---------- FEIXES COLORIDOS ---------- */

.rainbow {
  position: absolute;
  z-index: -2;

  height: clamp(9px, 2.1vw, 18px);
  width: 72vw;

  border-radius: 100%;

  opacity: 0.86;

  background:
    linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,40,0,0.9) 20%,
      rgba(255,150,0,0.95) 34%,
      rgba(70,255,40,0.95) 53%,
      rgba(0,210,255,0.95) 70%,
      rgba(40,70,255,0.96) 86%,
      transparent 100%
    );

  filter: blur(3px) saturate(1.6);

  animation: rainbowGlow 3.2s ease-in-out infinite;
}

.rainbow-top {
  top: 7%;
  right: -17vw;
  transform: rotate(12deg);
}

.rainbow-left {
  top: 24%;
  left: -35vw;
  transform: rotate(-8deg);
}

.rainbow-bottom {
  bottom: 14%;
  left: -28vw;
  transform: rotate(13deg);
  opacity: 0.55;
}

/* ---------- NOME ---------- */

#nameGlow {
  position: relative;
  z-index: 3;

  width: 96vw;
  max-width: 96vw;

  padding: 0 2vw;

  color: white;

  font-weight: 950;
  line-height: 0.78;
  letter-spacing: -0.065em;

  text-transform: uppercase;
  white-space: nowrap;

  text-shadow:
    0 0 3px rgba(255,255,255,0.95),
    0 0 12px rgba(255,255,255,0.35),
    0 0 45px rgba(80,125,255,0.2);

  animation: nameShine 3.2s ease-in-out infinite;
}

/* Pequeno brilho que atravessa o nome */

#nameGlow::after {
  content: "";
  position: absolute;
  top: -25%;
  bottom: -25%;
  left: -35%;

  width: 18%;

  transform: skewX(-16deg);

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.15),
      rgba(255,255,255,0.85),
      rgba(120,210,255,0.28),
      transparent
    );

  filter: blur(3px);

  mix-blend-mode: screen;

  animation: sweep 4.2s ease-in-out infinite;
}

/* ---------- PONTOS DE LUZ ---------- */

.sparkles {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.sparkles span {
  position: absolute;

  width: 3px;
  height: 3px;

  border-radius: 50%;

  background: white;

  box-shadow:
    0 0 6px white,
    0 0 14px rgba(100,150,255,0.9);

  animation: twinkle 2.6s ease-in-out infinite;
}

.sparkles span:nth-child(1) { left: 13%; top: 21%; }
.sparkles span:nth-child(2) { left: 29%; top: 33%; animation-delay: -.6s; }
.sparkles span:nth-child(3) { left: 74%; top: 28%; animation-delay: -1.3s; }
.sparkles span:nth-child(4) { left: 87%; top: 64%; animation-delay: -.9s; }
.sparkles span:nth-child(5) { left: 19%; top: 76%; animation-delay: -1.8s; }
.sparkles span:nth-child(6) { left: 63%; top: 79%; animation-delay: -.4s; }
.sparkles span:nth-child(7) { left: 47%; top: 18%; animation-delay: -1.1s; }
.sparkles span:nth-child(8) { left: 82%; top: 43%; animation-delay: -2s; }

/* ---------- ANIMAÇÕES ---------- */

@keyframes nameShine {
  0%,
  100% {
    transform: scale(0.97);
    filter: brightness(0.85);
    text-shadow:
      0 0 3px rgba(255,255,255,0.85),
      0 0 10px rgba(255,255,255,0.25),
      0 0 35px rgba(40,90,255,0.16);
  }

  50% {
    transform: scale(1.035);
    filter: brightness(1.35);
    text-shadow:
      0 0 4px white,
      0 0 18px rgba(255,255,255,0.8),
      0 0 70px rgba(85,130,255,0.5),
      0 0 140px rgba(30,80,255,0.25);
  }
}

@keyframes prismPulse {
  0%,
  100% {
    opacity: 0.5;
    transform: translate(-50%, -53%) scale(0.97);
  }

  50% {
    opacity: 0.96;
    transform: translate(-50%, -53%) scale(1.04);
  }
}

@keyframes cloudPulse {
  0%,
  100% {
    opacity: 0.4;
    transform: translate(-50%, -50%) scale(0.92);
  }

  50% {
    opacity: 0.9;
    transform: translate(-50%, -50%) scale(1.08);
  }
}

@keyframes prismFloat {
  0%,
  100% {
    margin-top: -5px;
    filter:
      saturate(1.25)
      drop-shadow(0 0 7px rgba(255,255,255,0.36))
      drop-shadow(0 0 13px rgba(35,95,255,0.3));
  }

  50% {
    margin-top: 8px;
    filter:
      saturate(1.8)
      drop-shadow(0 0 12px rgba(255,255,255,0.72))
      drop-shadow(0 0 25px rgba(35,95,255,0.7));
  }
}

@keyframes rainbowGlow {
  0%,
  100% {
    opacity: 0.35;
    filter: blur(5px) saturate(1.2);
  }

  50% {
    opacity: 0.95;
    filter: blur(2px) saturate(1.9);
  }
}

@keyframes sweep {
  0%,
  24% {
    left: -35%;
    opacity: 0;
  }

  38% {
    opacity: 0.9;
  }

  62% {
    opacity: 0.9;
  }

  76%,
  100% {
    left: 118%;
    opacity: 0;
  }
}

@keyframes twinkle {
  0%,
  100% {
    opacity: 0.2;
    transform: scale(0.7);
  }

  50% {
    opacity: 1;
    transform: scale(1.6);
  }
}

/* ---------- ACESSIBILIDADE ---------- */

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 8s !important;
  }
}
</style>
</head>

<body>

<!-- TELA INICIAL -->

<section id="startScreen" class="screen">
  <div class="start-content">
    <h1>VAMOS<br>BRILHAR?</h1>

    <p class="instruction">
      Escreva aqui seu nome.
    </p>

    <input
      id="nameInput"
      type="text"
      maxlength="18"
      autocomplete="off"
      autocapitalize="words"
      placeholder="Seu nome"
      aria-label="Digite seu nome"
    >

    <button id="shineButton" type="button">
      Brilhar
    </button>
  </div>
</section>

<!-- TELA DO NOME -->

<section id="shineScreen" class="screen">

  <div class="texture"></div>
  <div class="blue-cloud"></div>

  <div class="rainbow rainbow-top"></div>
  <div class="rainbow rainbow-left"></div>
  <div class="rainbow rainbow-bottom"></div>

  <div class="prism"></div>

  <div class="mini-prism mini-left"></div>
  <div class="mini-prism mini-right"></div>

  <div class="sparkles" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div id="nameGlow"></div>

</section>

<script>
const startScreen = document.getElementById("startScreen");
const shineScreen = document.getElementById("shineScreen");
const nameInput = document.getElementById("nameInput");
const nameGlow = document.getElementById("nameGlow");
const shineButton = document.getElementById("shineButton");

function fitTextToScreen(element) {
  const availableWidth = window.innerWidth * 0.92;
  const availableHeight = window.innerHeight * 0.48;

  let minimumSize = 38;
  let maximumSize = Math.min(window.innerWidth * 0.43, 520);
  let bestSize = minimumSize;

  element.style.fontSize = minimumSize + "px";

  while (minimumSize <= maximumSize) {
    const testSize = Math.floor((minimumSize + maximumSize) / 2);

    element.style.fontSize = testSize + "px";

    const fitsWidth = element.scrollWidth <= availableWidth;
    const fitsHeight = element.scrollHeight <= availableHeight;

    if (fitsWidth && fitsHeight) {
      bestSize = testSize;
      minimumSize = testSize + 1;
    } else {
      maximumSize = testSize - 1;
    }
  }

  element.style.fontSize = bestSize + "px";
}

function shine() {
  const typedName = nameInput.value.trim();
  const finalName = typedName || "VOCÊ";

  nameGlow.textContent = finalName;

  startScreen.style.display = "none";
  shineScreen.style.display = "flex";

  requestAnimationFrame(() => {
    fitTextToScreen(nameGlow);
  });
}

shineButton.addEventListener("click", shine);

nameInput.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    shine();
  }
});

window.addEventListener("resize", function() {
  if (shineScreen.style.display === "flex") {
    fitTextToScreen(nameGlow);
  }
});
</script>

</body>
</html>
