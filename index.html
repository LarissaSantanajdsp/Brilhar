<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

#question {
  position: absolute;
  text-align: center;
  color: white;
  z-index: 4;
  animation: questionToLight 2.6s ease-in-out forwards;
}

#question h1 {
  margin: 0;
  font-size: clamp(40px, 8vw, 84px);
  font-weight: 800;
  letter-spacing: .08em;
}

#question p {
  margin-top: 28px;
  font-size: clamp(18px, 3vw, 30px);
  font-weight: 400;
  opacity: .9;
}

.light {
  position: absolute;
  width: 185vmax;
  height: 185vmax;
  border-radius: 50%;
  opacity: 0;
  background: radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    rgba(255,255,255,1) 10%,
    rgba(240,240,240,.95) 22%,
    rgba(210,210,210,.65) 38%,
    rgba(150,150,150,.32) 56%,
    rgba(90,90,90,.14) 72%,
    rgba(0,0,0,0) 88%
  );
  animation:
    appear 1s ease-out 2.3s forwards,
    pulse 3.8s ease-in-out 3.3s infinite;
}

.light::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255,255,255,.95) 0%,
    rgba(255,255,255,.75) 16%,
    rgba(255,255,255,.28) 36%,
    rgba(255,255,255,.08) 58%,
    rgba(255,255,255,0) 82%
  );
  animation: halo 3.8s ease-in-out 3.3s infinite;
}

.light::after {
  content: "";
  position: absolute;
  inset: 42%;
  border-radius: 50%;
  background: white;
  box-shadow:
    0 0 40px white,
    0 0 90px white,
    0 0 180px white;
  animation: twinkle 2.4s ease-in-out 3.3s infinite;
}

@keyframes questionToLight {
  0%, 78% {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
  }

  100% {
    opacity: 0;
    transform: scale(1.35);
    filter: blur(10px);
    text-shadow:
      0 0 25px white,
      0 0 70px white,
      0 0 140px white;
  }
}

@keyframes appear {
  from {
    opacity: 0;
    transform: scale(.04);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(.98);
    filter: brightness(.65) blur(5px);
  }

  50% {
    transform: scale(1.14);
    filter: brightness(1.35) blur(0);
  }
}

@keyframes halo {
  0%, 100% {
    opacity: .35;
    transform: scale(.92);
  }

  50% {
    opacity: 1;
    transform: scale(1.18);
  }
}

@keyframes twinkle {
  0%, 100% {
    opacity: .75;
    transform: scale(.9);
  }

  50% {
    opacity: 1;
    transform: scale(1.15);
  }
}
</style>
</head>

<body>
  <div id="question">
    <h1>VAMOS BRILHAR?</h1>
    <p>Coloque o brilho da tela no máximo.</p>
  </div>

  <div class="light"></div>
</body>
</html>
