<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  margin: 0 24px 28px;
  font-size: clamp(42px, 9vw, 90px);
  letter-spacing: .08em;
}

p {
  margin: 0 24px 24px;
  font-size: clamp(20px, 4vw, 34px);
}

input {
  width: min(80vw, 520px);
  padding: 18px 22px;
  border-radius: 18px;
  border: 2px solid white;
  background: transparent;
  color: white;
  font-size: clamp(22px, 5vw, 36px);
  text-align: center;
  outline: none;
}

button {
  margin-top: 24px;
  padding: 16px 34px;
  border-radius: 999px;
  border: 0;
  background: white;
  color: black;
  font-size: clamp(18px, 4vw, 28px);
  font-weight: 700;
}

#shineScreen {
  display: none;
  background: radial-gradient(circle, #222 0%, #000 70%);
}

#nameGlow {
  padding: 0 24px;
  font-size: clamp(54px, 16vw, 150px);
  font-weight: 900;
  letter-spacing: .06em;
  text-transform: uppercase;
  animation: glow 2.6s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% {
    color: #ddd;
    text-shadow:
      0 0 20px rgba(255,255,255,.5),
      0 0 60px rgba(255,255,255,.25);
    transform: scale(.98);
  }

  50% {
    color: #fff;
    text-shadow:
      0 0 30px white,
      0 0 90px white,
      0 0 180px white,
      0 0 300px white;
    transform: scale(1.06);
  }
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>VAMOS BRILHAR?</h1>
  <p>Escreva aqui seu nome.</p>

  <input id="nameInput" type="text" maxlength="18" autocomplete="off" autofocus>

  <button onclick="shine()">Brilhar</button>
</div>

<div id="shineScreen" class="screen">
  <div id="nameGlow"></div>
</div>

<script>
function shine() {
  const input = document.getElementById("nameInput");
  const name = input.value.trim();

  document.getElementById("nameGlow").textContent = name || "VOCÊ";
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("shineScreen").style.display = "flex";
}

document.getElementById("nameInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    shine();
  }
});
</script>

</body>
</html>
