<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ---------- TELA INICIAL ---------- */

#question{
    position:absolute;
    text-align:center;
    color:white;
    z-index:2;

    animation:questionToLight 2.6s ease-in-out forwards;
}

#question h1{
    margin:0;
    font-size:clamp(40px,8vw,84px);
    font-weight:800;
    letter-spacing:.08em;
}

#question p{
    margin-top:28px;
    font-size:clamp(18px,3vw,30px);
    font-weight:400;
    opacity:.9;
}

/* ---------- ESFERA DE LUZ ---------- */

.light{

    position:absolute;

    width:180vmax;
    height:180vmax;

    border-radius:50%;

    opacity:0;

    background:radial-gradient(circle,

        rgba(255,255,255,1) 0%,
        rgba(248,248,248,.98) 15%,
        rgba(220,220,220,.80) 34%,
        rgba(170,170,170,.45) 52%,
        rgba(110,110,110,.18) 70%,
        rgba(0,0,0,0) 88%

    );

    animation:
        appear .9s ease-out 2.3s forwards,
        pulse 4s ease-in-out 3.2s infinite;

}

/* ---------- ANIMAÇÕES ---------- */

@keyframes questionToLight{

    0%,80%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }

    100%{
        opacity:0;
        transform:scale(1.35);
        filter:blur(10px);
        text-shadow:
            0 0 25px white,
            0 0 70px white,
            0 0 140px white;
    }

}

@keyframes appear{

    from{
        opacity:0;
        transform:scale(.05);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

@keyframes pulse{

    0%,100%{
        transform:scale(1);
        filter:brightness(.70) blur(3px);
    }

    50%{
        transform:scale(1.08);
        filter:brightness(1.20) blur(0);
    }

}

</style>

</head>

<body>

<div id="question">
    <h1>VAMOS BRILHAR?</h1>
    <p>Coloque o brilho da tela no máximo.</p>
</div>

<div class="light"></div>

</body>

</html>
