<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

#question {
  position: absolute;
  color: white;
  font-size: clamp(30px, 6vw, 64px);
  font-weight: 800;
  letter-spacing: .12em;
  text-align: center;
  z-index: 2;

  animation: questionToLight 1.4s ease-in-out forwards;
}

.light {
  position: absolute;
  width: 180vmax;
  height: 180vmax;
  border-radius: 50%;
  opacity: 0;

  background: radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    rgba(255,255,255,1) 12%,
    rgba(255,255,255,.95) 24%,
    rgba(255,255,255,.70) 40%,
    rgba(255,255,255,.35) 58%,
    rgba(255,255,255,.12) 72%,
    rgba(255,255,255,0) 88%
  );

  animation:
    appear .6s ease-out 1.15s forwards,
    pulse 4s ease-in-out 1.75s infinite;
}

@keyframes questionToLight {
  0% {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
    text-shadow: 0 0 0 white;
  }

  70% {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
    text-shadow: 0 0 0 white;
  }

  100% {
    opacity: 0;
    transform: scale(1.8);
    filter: blur(12px);
    text-shadow:
      0 0 20px white,
      0 0 60px white,
      0 0 120px white;
  }
}

@keyframes appear {
  from {
    opacity: 0;
    transform: scale(.05);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    filter: blur(2px);
  }

  50% {
    transform: scale(1.12);
    filter: blur(0);
  }
}
</style>
</head>

<body>
  <div id="question">VAMOS BRILHAR?</div>
  <div class="light"></div>
</body>
</html>
