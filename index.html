<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  margin: 0 24px 28px;
  font-size: clamp(42px, 9vw, 90px);
  letter-spacing: .08em;
}

p {
  margin: 0 24px 24px;
  font-size: clamp(20px, 4vw, 34px);
}

input {
  width: min(80vw, 520px);
  padding: 18px 22px;
  border-radius: 18px;
  border: 2px solid white;
  background: transparent;
  color: white;
  font-size: clamp(22px, 5vw, 36px);
  text-align: center;
  outline: none;
}

button {
  margin-top: 24px;
  padding: 16px 34px;
  border-radius: 999px;
  border: 0;
  background: white;
  color: black;
  font-size: clamp(18px, 4vw, 28px);
  font-weight: 700;
}

#shineScreen {
  display: none;
  background: radial-gradient(circle, #111 0%, #000 70%);
}

#nameGlow {
  width: 96vw;
  max-height: 80vh;
  text-align: center;
  padding: 0;
  font-weight: 900;
  line-height: .82;
  letter-spacing: -.06em;
  text-transform: uppercase;
  white-space: nowrap;
  animation: glow 2.6s ease-in-out infinite;
}

@keyframes glow {
  0%,100% {
    color: #aaa;
    text-shadow:
      0 0 25px rgba(255,255,255,.4),
      0 0 90px rgba(255,255,255,.18);
    transform: scale(.96);
  }

  50% {
    color: white;
    text-shadow:
      0 0 50px white,
      0 0 140px white,
      0 0 280px white,
      0 0 500px white;
    transform: scale(1.08);
  }
}
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <h1>VAMOS BRILHAR?</h1>
  <p>Escreva aqui seu nome.</p>

  <input id="nameInput" type="text" maxlength="18" autocomplete="off" autofocus>

  <button onclick="shine()">Brilhar</button>
</div>

<div id="shineScreen" class="screen">
  <div id="nameGlow"></div>
</div>

<script>
function fitTextToScreen(element) {
  let fontSize = 40;
  const maxFontSize = 520;

  element.style.fontSize = fontSize + "px";

  while (
    element.scrollWidth <= window.innerWidth * 0.96 &&
    element.scrollHeight <= window.innerHeight * 0.80 &&
    fontSize < maxFontSize
  ) {
    fontSize += 4;
    element.style.fontSize = fontSize + "px";
  }

  element.style.fontSize = (fontSize - 4) + "px";
}

function shine() {
  const input = document.getElementById("nameInput");
  const name = input.value.trim();

  const nameGlow = document.getElementById("nameGlow");
  nameGlow.textContent = name || "VOCÊ";

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("shineScreen").style.display = "flex";

  fitTextToScreen(nameGlow);
}

window.addEventListener("resize", function() {
  const nameGlow = document.getElementById("nameGlow");
  if (nameGlow.textContent.trim()) {
    fitTextToScreen(nameGlow);
  }
});

document.getElementById("nameInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    shine();
  }
});
</script>

</body>
</html>
